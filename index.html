<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENDORA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    overflow-x: hidden;
}

/* REAL WALL BASE */
.wall {
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,0.08), transparent 35%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.05), transparent 45%),
        linear-gradient(120deg, #0a0a0a, #000);
    z-index: -3;
}

/* GRAFFITI NOISE / PAINT FEEL */
.noise {
    position: fixed;
    inset: 0;
    z-index: -2;
    background-image: url("https://grainy-gradients.vercel.app/noise.svg");
    opacity: 0.12;
    mix-blend-mode: overlay;
}

/* SPRAY BLOBS */
.spray {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    filter: blur(120px);
    z-index: -1;
}

.s1 { top: 10%; left: 5%; background: rgba(255,255,255,0.05); }
.s2 { top: 50%; right: 5%; background: rgba(255,255,255,0.04); }
.s3 { bottom: 10%; left: 40%; background: rgba(255,255,255,0.03); }

/* HEADER */
header {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    padding: 15px 25px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* GRAFFITI TITLE */
.logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 5px;
    text-shadow:
        0 0 5px #fff,
        0 0 15px rgba(255,255,255,0.3);
}

/* GRID */
.container {
    padding: 22px;
}

h2 {
    font-weight: 400;
    letter-spacing: 2px;
}

/* POSTER STYLE GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
}

/* STICKER / POSTER CARDS */
.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    overflow: hidden;
    transform: rotate(-1deg);
    position: relative;
}

.card:nth-child(even) {
    transform: rotate(1.5deg);
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.08), transparent);
    opacity: 0.3;
}

.card:hover {
    transform: scale(1.04) rotate(0deg);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    filter: contrast(1.2) saturate(1.1);
}

/* TEXT */
.card-content {
    padding: 12px;
}

.price {
    color: #aaa;
    margin-top: 5px;
}

/* BUY BUTTON */
button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #ddd;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
}

.modal.active {
    display: flex;
}

.modal-box {
    background: #111;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
}

/* FORM */
.form-box {
    margin-top: 40px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 18px;
    border-radius: 10px;
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
}
</style>
</head>

<body>

<div class="wall"></div>
<div class="noise"></div>

<div class="spray s1"></div>
<div class="spray s2"></div>
<div class="spray s3"></div>

<header>
    <div class="logo">VENDORA</div>
</header>

<div class="container">

    <h2>DROP WALL</h2>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Street Hoodie</h3>
                <div class="price">$50</div>
                <button data-item="Street Hoodie" data-price="50">BUY</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Vintage Sneakers</h3>
                <div class="price">$120</div>
                <button data-item="Vintage Sneakers" data-price="120">BUY</button>
            </div>
        </div>

    </div>

    <div class="form-box">
        <h2>REQUEST ON WALL</h2>
        <iframe src="https://forms.gle/guubrsHSWtuWRtix7"></iframe>
    </div>

</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h2 id="item"></h2>
        <p id="price"></p>
        <h1>$JayJay-LXMNS</h1>
        <button onclick="copyCash()">COPY</button>
    </div>
</div>

<script>
const modal = document.getElementById("modal");
const item = document.getElementById("item");
const price = document.getElementById("price");

document.querySelectorAll("button[data-item]").forEach(btn => {
    btn.onclick = () => {
        item.textContent = btn.dataset.item;
        price.textContent = "Send $" + btn.dataset.price;
        modal.classList.add("active");
    };
});

modal.onclick = (e) => {
    if (e.target === modal) modal.classList.remove("active");
};

function copyCash() {
    navigator.clipboard.writeText("$JayJay-LXMNS");
    alert("Copied");
}
</script>

</body>
</html>
