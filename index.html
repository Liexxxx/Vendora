<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendora</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: white;
}

header {
    background: #151515;
    padding: 15px 25px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    justify-content: space-between;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
}

.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.price {
    color: #aaa;
}

button {
    margin-top: 10px;
    background: white;
    color: black;
    border: none;
    padding: 10px;
    width: 100%;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #ddd;
}

.payment-box {
    margin-top: 40px;
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.copy-btn {
    margin-top: 10px;
    background: #2a2a2a;
    color: white;
}

.copy-btn:hover {
    background: #3a3a3a;
}

.form-box {
    margin-top: 40px;
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
}
</style>
</head>

<body>

<header>
    <div class="logo">VENDORA.</div>
</header>

<div class="container">

    <h2>Featured Drops</h2>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Street Hoodie</h3>
                <div class="price">$50</div>
                <button onclick="showPayment('Street Hoodie', 50)">Buy</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Vintage Sneakers</h3>
                <div class="price">$120</div>
                <button onclick="showPayment('Vintage Sneakers', 120)">Buy</button>
            </div>
        </div>

    </div>

    <!-- PAYMENT -->
    <div class="payment-box" id="paymentBox" style="display:none;">
        <h2 id="itemTitle">Item</h2>

        <p id="priceText" style="color:#aaa;">Send payment via Cash App</p>

        <h1 style="font-size:32px;">$JayJay-LXMNS</h1>

        <button class="copy-btn" onclick="copyCashApp()">Copy Username</button>

        <p style="margin-top:10px; font-size:14px; color:#777;">
            Pay the listed amount, then confirm your order.
        </p>
    </div>

    <!-- REQUEST FORM -->
    <div class="form-box">
        <h2>Request an Item (In-Person)</h2>
        <iframe src="https://forms.gle/guubrsHSWtuWRtix7"></iframe>
    </div>

</div>

<script>
function showPayment(item, price) {
    document.getElementById("paymentBox").style.display = "block";

    document.getElementById("itemTitle").innerText = item;
    document.getElementById("priceText").innerText = "Send $" + price + " via Cash App";

    window.scrollTo({
        top: document.getElementById("paymentBox").offsetTop,
        behavior: "smooth"
    });
}

function copyCashApp() {
    navigator.clipboard.writeText("$JayJay-LXMNS");
    alert("Cash App username copied!");
}
</script>

</body>
</html>
