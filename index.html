<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendora</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    overflow-x: hidden;
}

.bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 20% 20%, #1a1a1a, #000);
    z-index: -3;
}

.wall {
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
        radial-gradient(circle at 15% 25%, rgba(255,255,255,0.07), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.05), transparent 45%),
        radial-gradient(circle at 50% 75%, rgba(255,255,255,0.04), transparent 50%),
        linear-gradient(120deg, rgba(255,255,255,0.02), transparent 60%);
}

.spray {
    position: fixed;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -1;
}

.s1 { top: 10%; left: 10%; background: rgba(255,255,255,0.05); }
.s2 { top: 50%; right: 10%; background: rgba(255,255,255,0.04); }
.s3 { bottom: 10%; left: 40%; background: rgba(255,255,255,0.03); }

header {
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 15px 25px;
}

.logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 4px;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
}

.container {
    padding: 22px;
}

h2 {
    font-weight: 500;
    letter-spacing: 1px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
}

.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    transition: 0.2s;
    transform: rotate(-0.5deg);
}

.card:nth-child(even) {
    transform: rotate(0.8deg);
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    filter: contrast(1.1);
}

.card-content {
    padding: 12px;
}

.price {
    color: #aaa;
    margin-top: 5px;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #e6e6e6;
}

.modal {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
}

.modal.active {
    display: flex;
}

.modal-box {
    background: #111;
    padding: 20px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
}

.form-box {
    margin-top: 40px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 18px;
    border-radius: 12px;
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="wall"></div>

<div class="spray s1"></div>
<div class="spray s2"></div>
<div class="spray s3"></div>

<header>
    <div class="logo">VENDORA</div>
</header>

<div class="container">

    <h2>DROP LIST</h2>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Street Hoodie</h3>
                <div class="price">$50</div>
                <button data-item="Street Hoodie" data-price="50">BUY</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Vintage Sneakers</h3>
                <div class="price">$120</div>
                <button data-item="Vintage Sneakers" data-price="120">BUY</button>
            </div>
        </div>

    </div>

    <div class="form-box">
        <h2>REQUEST ITEM</h2>
        <iframe src="https://forms.gle/guubrsHSWtuWRtix7"></iframe>
    </div>

</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h2 id="item"></h2>
        <p id="price"></p>
        <h1>$JayJay-LXMNS</h1>
        <button onclick="copyCash()">COPY</button>
    </div>
</div>

<script>
const modal = document.getElementById("modal");
const item = document.getElementById("item");
const price = document.getElementById("price");

document.querySelectorAll("button[data-item]").forEach(btn => {
    btn.onclick = () => {
        item.textContent = btn.dataset.item;
        price.textContent = "Send $" + btn.dataset.price;
        modal.classList.add("active");
    };
});

modal.onclick = (e) => {
    if (e.target === modal) modal.classList.remove("active");
};

function copyCash() {
    navigator.clipboard.writeText("$JayJay-LXMNS");
    alert("Copied");
}
</script>

</body>
</html>
