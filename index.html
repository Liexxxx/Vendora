<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendora</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* 🔥 BACKGROUND LAYERS */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 20%, #1a1a1a, #000);
    z-index: -3;
}

.blur {
    position: fixed;
    width: 200%;
    height: 200%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.05), transparent);
    animation: move 10s linear infinite;
    z-index: -2;
}

@keyframes move {
    0% { transform: translateX(-50%) rotate(25deg); }
    100% { transform: translateX(50%) rotate(25deg); }
}

/* PARTICLES */
.particle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    animation: float 6s infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-200px); opacity: 0; }
}

/* HEADER */
header {
    backdrop-filter: blur(15px);
    background: rgba(0,0,0,0.6);
    padding: 15px 25px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* GRAFFITI LOGO */
.logo {
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 3px;
    color: white;
    text-shadow:
        0 0 5px white,
        0 0 10px rgba(255,255,255,0.5),
        0 0 20px rgba(255,255,255,0.3);
}

/* GRID */
.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
    position: relative;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 15px;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: 0.3s;
}

.card:hover::before {
    opacity: 1;
}

.card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 0 25px rgba(255,255,255,0.1);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.price {
    color: #aaa;
}

/* BUTTON */
button {
    margin-top: 10px;
    background: white;
    color: black;
    border: none;
    padding: 10px;
    width: 100%;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #ddd;
}

/* MODAL */
.modal {
    position: fixed;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: rgba(20,20,20,0.9);
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    width: 300px;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

/* FORM */
.form-box {
    margin-top: 40px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="blur"></div>

<header>
    <div class="logo">VENDORA</div>
</header>

<div class="container">

    <h2>Featured Drops</h2>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Street Hoodie</h3>
                <div class="price">$50</div>
                <button onclick="openModal('Street Hoodie', 50)">Buy</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Vintage Sneakers</h3>
                <div class="price">$120</div>
                <button onclick="openModal('Vintage Sneakers', 120)">Buy</button>
            </div>
        </div>

    </div>

    <div class="form-box">
        <h2>Request Item</h2>
        <iframe src="https://forms.gle/guubrsHSWtuWRtix7"></iframe>
    </div>

</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h2 id="modalItem"></h2>
        <p id="modalPrice"></p>
        <h1>$JayJay-LXMNS</h1>
        <button onclick="copyCash()">Copy Username</button>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>
function openModal(item, price) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalItem").innerText = item;
    document.getElementById("modalPrice").innerText = "Send $" + price + " via Cash App";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function copyCash() {
    navigator.clipboard.writeText("$JayJay-LXMNS");
    alert("Copied!");
}

/* PARTICLES SPAWN */
for (let i = 0; i < 40; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.top = Math.random() * 100 + "vh";
    p.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(p);
}
</script>

</body>
</html>
