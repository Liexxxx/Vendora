<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendora</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: white;
        }

        header {
            background: #2b2b2b;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: #2b2b2b;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }

        button {
            background: #4CAF50;
            border: none;
            padding: 10px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

<header>Vendora Marketplace</header>

<div class="container">
    <div class="card">
        <h2>Item Title</h2>
        <p>$50</p>
        <button>Buy</button>
    </div>

    <div class="card">
        <h2>Another Item</h2>
        <p>$120</p>
        <button>Buy</button>
    </div>
</div>

</body>
</html>
