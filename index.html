<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendora</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    background: #0a0a0a;
    overflow-x: hidden;
}

/* 🔥 CLEAN BLURRED BACKGROUND */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 20%, #1a1a1a, #000);
    z-index: -2;
}

.bg-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    background: rgba(255,255,255,0.05);
    filter: blur(120px);
    border-radius: 50%;
    top: 20%;
    left: 30%;
    z-index: -1;
}

/* HEADER */
header {
    backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.6);
    padding: 15px 25px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
}

/* CONTAINER */
.container {
    padding: 25px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 25px;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(14px);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.price {
    color: #aaa;
    margin: 6px 0;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #ddd;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
}

.modal.active {
    display: flex;
}

.modal-box {
    background: #111;
    padding: 25px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* FORM */
.form-box {
    margin-top: 40px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-radius: 12px;
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="bg-glow"></div>

<header>
    <div class="logo">VENDORA</div>
</header>

<div class="container">

    <h2>Featured Drops</h2>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Street Hoodie</h3>
                <div class="price">$50</div>
                <button data-item="Street Hoodie" data-price="50">Buy</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Vintage Sneakers</h3>
                <div class="price">$120</div>
                <button data-item="Vintage Sneakers" data-price="120">Buy</button>
            </div>
        </div>

    </div>

    <div class="form-box">
        <h2>Request Item</h2>
        <iframe src="https://forms.gle/guubrsHSWtuWRtix7"></iframe>
    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h2 id="itemName"></h2>
        <p id="itemPrice"></p>
        <h1>$JayJay-LXMNS</h1>
        <button onclick="copyCash()">Copy Username</button>
    </div>
</div>

<script>
const modal = document.getElementById("modal");
const itemName = document.getElementById("itemName");
const itemPrice = document.getElementById("itemPrice");

/* FIXED BUY BUTTON SYSTEM */
document.querySelectorAll("button[data-item]").forEach(btn => {
    btn.addEventListener("click", () => {
        const item = btn.getAttribute("data-item");
        const price = btn.getAttribute("data-price");

        itemName.textContent = item;
        itemPrice.textContent = "Send $" + price + " via Cash App";

        modal.classList.add("active");
    });
});

/* CLOSE MODAL */
modal.addEventListener("click", (e) => {
    if (e.target === modal) {
        modal.classList.remove("active");
    }
});

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        modal.classList.remove("active");
    }
});

function copyCash() {
    navigator.clipboard.writeText("$JayJay-LXMNS");
    alert("Copied!");
}
</script>

</body>
</html>
