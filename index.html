<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendora</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow-x: hidden;
}

/* 🔥 BACKGROUND */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 30%, #1a1a1a, #000);
    z-index: -2;
}

.bg::after {
    content: "";
    position: absolute;
    width: 150%;
    height: 150%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.05), transparent);
    transform: rotate(25deg);
    animation: move 8s linear infinite;
}

@keyframes move {
    0% { transform: translateX(-50%) rotate(25deg); }
    100% { transform: translateX(50%) rotate(25deg); }
}

/* HEADER */
header {
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.5);
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
}

/* SEARCH */
.search {
    padding: 8px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 6px;
    color: white;
}

/* GRID */
.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.price {
    color: #aaa;
}

/* BUTTON */
button {
    margin-top: 10px;
    background: white;
    color: black;
    border: none;
    padding: 10px;
    width: 100%;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    background: #ddd;
}

/* MODAL */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: #111;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    width: 300px;
    animation: pop 0.2s ease;
}

@keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* FORM */
.form-box {
    margin-top: 40px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
    <div class="logo">VENDORA.</div>
    <input class="search" placeholder="Search...">
</header>

<div class="container">

    <h2>Featured Drops</h2>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Street Hoodie</h3>
                <div class="price">$50</div>
                <button onclick="openModal('Street Hoodie', 50)">Buy</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Vintage Sneakers</h3>
                <div class="price">$120</div>
                <button onclick="openModal('Vintage Sneakers', 120)">Buy</button>
            </div>
        </div>

    </div>

    <div class="form-box">
        <h2>Request an Item</h2>
        <iframe src="https://forms.gle/guubrsHSWtuWRtix7"></iframe>
    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h2 id="modalItem">Item</h2>
        <p id="modalPrice">Send via Cash App</p>

        <h1>$JayJay-LXMNS</h1>

        <button onclick="copyCash()">Copy Username</button>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>
function openModal(item, price) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalItem").innerText = item;
    document.getElementById("modalPrice").innerText = "Send $" + price + " via Cash App";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function copyCash() {
    navigator.clipboard.writeText("$JayJay-LXMNS");
    alert("Copied!");
}
</script>

</body>
</html>
