<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENDORA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    overflow-x: hidden;
}

/* SAFE BACKGROUND (NO BROKEN IMAGES) */
.bg {
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.05), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.04), transparent 50%),
        linear-gradient(120deg, #000, #0a0a0a);
    z-index: -3;
}

/* noise texture */
.noise {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 1px,
        transparent 1px,
        transparent 2px
    );
    opacity: 0.15;
    z-index: -2;
}

/* HEADER */
header {
    padding: 14px 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* ✍️ GRAFFITI LOGO ANIMATION */
.logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 5px;
    display: inline-block;
    position: relative;
}

.logo::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background: white;
    animation: draw 2s ease forwards;
}

@keyframes draw {
    to { width: 100%; }
}

/* DROP TIMER */
.timer {
    margin: 10px 0;
    color: #aaa;
}

/* GRID */
.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
}

/* CARDS (STOCKX x SUPREME STYLE) */
.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
    transition: 0.2s;
    transform: rotate(-0.5deg);
}

.card:nth-child(even) {
    transform: rotate(0.8deg);
}

.card:hover {
    transform: scale(1.03) rotate(0deg);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 12px;
}

.price {
    color: #aaa;
    margin-top: 5px;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
}

.modal.active {
    display: flex;
}

.modal-box {
    background: #111;
    padding: 20px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
}

/* FORM */
.form-box {
    margin-top: 30px;
    padding: 18px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="noise"></div>

<header>
    <div class="logo">VENDORA</div>
    <div class="timer">Next Drop in: <span id="countdown"></span></div>
</header>

<div class="container">

<h2>LIVE DROPS</h2>

<div class="grid">

    <div class="card">
        <img src="https://via.placeholder.com/300">
        <div class="card-content">
            <h3>Street Hoodie</h3>
            <div class="price">$50</div>
            <button data-item="Street Hoodie" data-price="50">BUY</button>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300">
        <div class="card-content">
            <h3>Vintage Sneakers</h3>
            <div class="price">$120</div>
            <button data-item="Vintage Sneakers" data-price="120">BUY</button>
        </div>
    </div>

</div>

<div class="form-box">
    <h2>REQUEST DROP</h2>
    <iframe src="https://forms.gle/guubrsHSWtuWRtix7"></iframe>
</div>

</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h2 id="item"></h2>
        <p id="price"></p>
        <h1>$JayJay-LXMNS</h1>
        <button onclick="copyCash()">COPY</button>
    </div>
</div>

<script>

/* BUY SYSTEM FIXED */
const modal = document.getElementById("modal");
const item = document.getElementById("item");
const price = document.getElementById("price");

document.querySelectorAll("button[data-item]").forEach(btn => {
    btn.addEventListener("click", () => {
        item.textContent = btn.dataset.item;
        price.textContent = "Send $" + btn.dataset.price;
        modal.classList.add("active");
    });
});

modal.onclick = (e) => {
    if (e.target === modal) modal.classList.remove("active");
};

function copyCash() {
    navigator.clipboard.writeText("$JayJay-LXMNS");
    alert("Copied");
}

/* COUNTDOWN (DROP SYSTEM) */
let dropTime = new Date().getTime() + (1000 * 60 * 60 * 3);

function updateCountdown() {
    let now = new Date().getTime();
    let diff = dropTime - now;

    let h = Math.floor(diff / (1000 * 60 * 60));
    let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    let s = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerText = h + "h " + m + "m " + s + "s";
}

setInterval(updateCountdown, 1000);

</script>

</body>
</html>
