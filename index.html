<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENDORA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    overflow-x: hidden;
}

/* 🌆 SKYLINE BACKGROUND */
.skyline {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 40%;
    background-image: url("https://i.imgur.com/8QfQX3L.png");
    background-size: cover;
    opacity: 0.15;
    z-index: -4;
}

/* 🧱 WALL TEXTURE */
.wall {
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.05), transparent 45%),
        linear-gradient(120deg, #000, #0b0b0b);
    z-index: -3;
}

/* 🎨 GRAFFITI OVERLAY */
.graffiti {
    position: fixed;
    inset: 0;
    background-image: url("https://i.imgur.com/4M7IWwP.png");
    opacity: 0.12;
    z-index: -2;
    mix-blend-mode: screen;
}

/* 🧼 NOISE */
.noise {
    position: fixed;
    inset: 0;
    background-image: url("https://grainy-gradients.vercel.app/noise.svg");
    opacity: 0.08;
    z-index: -1;
}

/* ✍️ ANIMATED LOGO */
.logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 6px;
    padding: 15px 25px;
    text-shadow:
        0 0 10px white,
        0 0 20px rgba(255,255,255,0.3);
    animation: flicker 2.5s infinite;
}

@keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}

/* HEADER */
header {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* GRID */
.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
}

/* 🧱 STICKER CARDS */
.card {
    position: relative;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    transform: rotate(-1deg);
    overflow: hidden;
}

.card:nth-child(even) {
    transform: rotate(1deg);
}

/* torn edge effect */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.1), transparent);
    opacity: 0.2;
}

/* image */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    filter: contrast(1.2);
}

.card-content {
    padding: 12px;
}

.price {
    color: #aaa;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
}

.modal.active {
    display: flex;
}

.modal-box {
    background: #111;
    padding: 20px;
    width: 300px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
}

/* FORM */
.form-box {
    margin-top: 40px;
    background: rgba(255,255,255,0.03);
    padding: 18px;
    border-radius: 10px;
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
}
</style>
</head>

<body>

<div class="skyline"></div>
<div class="wall"></div>
<div class="graffiti"></div>
<div class="noise"></div>

<header>
    <div class="logo">VENDORA</div>
</header>

<div class="container">

    <h2>DROP WALL</h2>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Street Hoodie</h3>
                <div class="price">$50</div>
                <button data-item="Street Hoodie" data-price="50">BUY</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Vintage Sneakers</h3>
                <div class="price">$120</div>
                <button data-item="Vintage Sneakers" data-price="120">BUY</button>
            </div>
        </div>

    </div>

    <div class="form-box">
        <h2>REQUEST DROP</h2>
        <iframe src="https://forms.gle/guubrsHSWtuWRtix7"></iframe>
    </div>

</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h2 id="item"></h2>
        <p id="price"></p>
        <h1>$JayJay-LXMNS</h1>
        <button onclick="copyCash()">COPY</button>
    </div>
</div>

<script>
const modal = document.getElementById("modal");
const item = document.getElementById("item");
const price = document.getElementById("price");

document.querySelectorAll("button[data-item]").forEach(btn => {
    btn.onclick = () => {
        item.textContent = btn.dataset.item;
        price.textContent = "Send $" + btn.dataset.price;
        modal.classList.add("active");
    };
});

modal.onclick = (e) => {
    if (e.target === modal) modal.classList.remove("active");
};

function copyCash() {
    navigator.clipboard.writeText("$JayJay-LXMNS");
    alert("Copied");
}
</script>

</body>
</html>
