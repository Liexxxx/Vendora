<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENDORA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    overflow-x: hidden;
}

/* 🔥 GRAFFITI BACKGROUND LAYERS */
.bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 20% 20%, #1a1a1a, #000);
    z-index: -3;
}

/* 🔥 REAL GRAFFITI WALL EFFECT */
.graffiti-layer {
    position: fixed;
    inset: 0;
    z-index: -2;

    background:
        radial-gradient(circle at 10% 30%, rgba(255,255,255,0.08), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.05), transparent 45%),
        radial-gradient(circle at 90% 70%, rgba(255,255,255,0.04), transparent 50%),

        linear-gradient(135deg, rgba(255,255,255,0.03), transparent 60%);

    filter: contrast(1.2) saturate(1.2);
    opacity: 0.9;
}

.spray-glow {
    position: fixed;
    width: 500px;
    height: 500px;
    background: rgba(255,255,255,0.08);
    filter: blur(120px);
    border-radius: 50%;
    top: 30%;
    left: 40%;
    z-index: -1;
}

/* HEADER */
header {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 15px 25px;
}

/* 🧨 GRAFFITI LOGO */
.logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    letter-spacing: 4px;
    color: white;
    text-shadow:
        2px 2px 0 #000,
        0 0 10px rgba(255,255,255,0.4),
        0 0 25px rgba(255,255,255,0.2);
}

/* CONTAINER */
.container {
    padding: 25px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
}

/* 🧱 GRAFFITI CARDS */
.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    transform: rotate(-0.5deg);
    transition: 0.2s;
}

/* sticker chaos feel */
.card:nth-child(odd) {
    transform: rotate(0.8deg);
}

.card:hover {
    transform: scale(1.04) rotate(0deg);
    box-shadow:
        0 0 20px rgba(255,255,255,0.15),
        0 0 40px rgba(255,255,255,0.05);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    filter: contrast(1.1) saturate(1.2);
}

/* TEXT */
.card-content {
    padding: 12px;
}

.price {
    color: #aaa;
}

/* 🔥 STREET BUTTON */
button {
    width: 100%;
    padding: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

button::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.1);
    transition: 0.3s;
}

button:hover::after {
    left: 0;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
}

.modal.active {
    display: flex;
}

.modal-box {
    background: #111;
    padding: 20px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
}

/* FORM */
.form-box {
    margin-top: 40px;
    background: rgba(255,255,255,0.04);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="graffiti-layer"></div>
<div class="spray-glow"></div>

<header>
    <div class="logo">VENDORA</div>
</header>

<div class="container">

    <h2>DROP LIST</h2>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Street Hoodie</h3>
                <div class="price">$50</div>
                <button data-item="Street Hoodie" data-price="50">BUY</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <div class="card-content">
                <h3>Vintage Sneakers</h3>
                <div class="price">$120</div>
                <button data-item="Vintage Sneakers" data-price="120">BUY</button>
            </div>
        </div>

    </div>

    <div class="form-box">
        <h2>REQUEST DROP</h2>
        <iframe src="https://forms.gle/guubrsHSWtuWRtix7"></iframe>
    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h2 id="item"></h2>
        <p id="price"></p>
        <h1>$JayJay-LXMNS</h1>
        <button onclick="copyCash()">COPY CASHAPP</button>
    </div>
</div>

<script>
const modal = document.getElementById("modal");
const item = document.getElementById("item");
const price = document.getElementById("price");

document.querySelectorAll("button[data-item]").forEach(btn => {
    btn.onclick = () => {
        item.textContent = btn.dataset.item;
        price.textContent = "Send $" + btn.dataset.price + " via Cash App";
        modal.classList.add("active");
    }
});

modal.onclick = (e) => {
    if (e.target === modal) modal.classList.remove("active");
};

function copyCash() {
    navigator.clipboard.writeText("$JayJay-LXMNS");
    alert("Copied Cash App!");
}
</script>

</body>
</html>
